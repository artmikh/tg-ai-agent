# Настройки парсинга
parsing:
  schedule_minutes: 5       # Как часто запускать (в минутах)
  messages_per_channel: 50   # Сколько сообщений читать за раз
  delay_between_channels: 5  # Пауза в секундах между каналами
  scan_depth_hours: 120      # Скольких часовой давности сообщения читать (720 = 30 дней)

# Настройки ИИ
ai:
  model: "gpt-4o-mini"     

# Шаблон сообщения
output_template: |
  {product} 
  📍 {location}
  ⚖️ {volume}
  💰 {price}
  📑 {payment}
  📞 {contact}
  🔗 Источник: {source_link}

#   Труба НКТ 73×5.5 (размер, стенка) 
# 📍 Нижневартовск / ХМАО (локация, местоположение)
# ⚖️ 120 т (объем, запас в тоннах)
# 💰 24 000 ₽/т (цена)
# 📑 без НДС ( тип оплаты С НДС/без НДС/Наличные)
# 📞 контакт в источнике

# 🔗 Источник: @канал (если одинаковые источники, то написать все по порядку)

# Промпты для ИИ
prompts:
  filter: |
    Ты — анализатор текста объявлений о продаже труб и металлопроката.
    Определи, является ли это объявлением о ПРОДАЖЕ или ПРЕДЛОЖЕНИИ товаров по темам: {keywords}.
    Если текст содержит запрос на ПОКУПКУ (слова "куплю", "купим", "ищем", "требуется", "спрос", "необходим") — ответь строго NO.
    Нас интересуют ТОЛЬКО продавцы (слова "продам", "продажа", "в наличии", "на складе", "предлагаем", "отгрузим").
    Учитывай синонимы, опечатки, сленг.
    ВАЖНО: Твой ответ должен состоять СТРОГО И ТОЛЬКО из одного слова: YES (если это продажа) или NO (если это покупка или не относится). 
    Никаких других слов, пояснений и НИКАКОГО JSON!
    Текст: {text}

  formatter: |
    Ты — профессиональный экстрактор данных из объявлений о продаже труб и металлопроката.
    В тексте может быть много позиций, но тебе нужно найти и извлечь данные ТОЛЬКО по позициям труб категории "НКТ" (насосно-компрессорные трубы), "ГНКТ" (гибкие НКТ) и "СБТ" (стальные бурильные трубы). Остальные трубы (159, 219, 530, электросварные и т.д.) строго игнорируй!
    
    Для КАЖДОЙ найденной позиции создай отдельный объект в JSON массиве.
    Если в тексте указаны общие условия (например, "Без НДС" или "Цена по запросу" в конце текста), примени их к каждой позиции.
    
    Поля для заполнения (если данных нет, пиши "Не указано"):
    - "product": Название и размер трубы (например: Труба НКТ 73х5.5 мм или ГНКТ 38.1 мм).
    - "location": Город, регион, склад (ищи в конце текста или заголовке).
    - "volume": Объем, количество, запас в тоннах или метрах.
    - "price": Цена.
    - "payment": Условия оплаты (НДС/Без НДС/Наличные).
    - "contact": Телефон или имя контакта.
    
    ВЕРНИ ОТВЕТ СТРОГО В ФОРМАТЕ JSON МАССИВА: [ {{...}}, {{...}} ]
    Если позиций НКТ/ГНКТ/СБТ нет, верни пустой массив: []
    
    Текст для обработки: {text}