# Настройки парсинга
parsing:
  schedule_minutes: 5       # Как часто запускать (в минутах)
  messages_per_channel: 50   # Сколько сообщений читать за раз
  delay_between_channels: 5  # Пауза в секундах между каналами
  scan_depth_hours: 72      # Скольких часовой давности сообщения читать (720 = 30 дней)

# Настройки ИИ
ai:
  model: "gpt-4o-mini"      # Модель OpenAI (можно поменять на gpt-4o, gpt-3.5-turbo и т.д.)

# Шаблон сообщения (поддерживает Markdown)
# Шаблон сообщения (HTML-теги <b> можно добавить позже, если понадобится жирный шрифт)
output_template: |
  {product} 
  📍 {location}
  ⚖️ {volume}
  💰 {price}
  📑 {payment}
  📞 {contact}
  🔗 Источник: {source_channel}

# Шаблон сообщения (используем HTML-теги <b> для жирного шрифта)
# output_template: |
#   <b>Найдено предложение!</b>
#   <b>Кто:</b> {who}
#   <b>Когда:</b> {when}
#   <b>Событие:</b> {event}
#   <b>Детали:</b> {details}

#   Труба НКТ 73×5.5 (размер, стенка) 
# 📍 Нижневартовск / ХМАО (локация, местоположение)
# ⚖️ 120 т (объем, запас в тоннах)
# 💰 24 000 ₽/т (цена)
# 📑 без НДС ( тип оплаты С НДС/без НДС/Наличные)
# 📞 контакт в источнике

# 🔗 Источник: @канал (если одинаковые источники, то написать все по порядку)

# Промпты для ИИ
prompts:
  filter: |
    Ты — анализатор текста объявлений о продаже труб и металлопроката.
    Определи, является ли это объявлением о ПРОДАЖЕ или ПРЕДЛОЖЕНИИ товаров по темам: {keywords}.
    Если текст содержит запрос на ПОКУПКУ (слова "куплю", "купим", "ищем", "требуется", "спрос", "необходим") — ответь строго NO.
    Нас интересуют ТОЛЬКО продавцы (слова "продам", "продажа", "в наличии", "на складе", "предлагаем", "отгрузим").
    Учитывай синонимы, опечатки, сленг.
    Ответь ТОЛЬКО одним словом: YES (если это продажа) или NO (если это покупка или не относится).
    Текст: {text}

  formatter: |
    Ты — профессиональный экстрактор данных из объявлений о продаже труб и металлопроката.
    В тексте может быть много позиций, но тебе нужно найти и извлечь данные ТОЛЬКО по позициям "НКТ" (насосно-компрессорные трубы). Остальные трубы (159, 219, 530 и т.д.) игнорируй!
    
    Для КАЖДОЙ найденной позиции НКТ создай отдельный объект в JSON массиве.
    Если в тексте указаны общие условия (например, "Без НДС" или "Цена по запросу" в конце текста), примени их к каждой позиции НКТ.
    
    Поля для заполнения (если данных нет, пиши "Не указано"):
    - "product": Название и размер трубы (например: Труба НКТ 73х5.5 мм).
    - "location": Город, регион, склад (ищи в конце текста или заголовке).
    - "volume": Объем, количество, запас в тоннах или метрах.
    - "price": Цена.
    - "payment": Условия оплаты (НДС/Без НДС/Наличные).
    - "contact": Телефон или имя контакта.
    
    ВЕРНИ ОТВЕТ СТРОГО В ФОРМАТЕ JSON МАССИВА: [ {{...}}, {{...}} ]
    Если позиций НКТ нет, верни пустой массив: []
    
    Текст для обработки: {text}

